<div class="exam-layout h-full flex flex-col" *ngIf="state().questions.length > 0">
  <!-- Header -->
  <header class="header flex items-center justify-between">
    <div class="header-left flex items-center">
      <button class="exit-btn flex items-center justify-center" (click)="exitExam()" title="Exit Exam">
        <lucide-icon [img]="X" [size]="20"></lucide-icon>
      </button>
      <span class="exam-title">{{ state().examTitle }}</span>
    </div>

  </header>

  <!-- Main Body -->
  <div class="main-body flex">
    <!-- Question Section (Left) -->
    <div class="question-section flex-col">
      <div class="section-tabs">
        <button class="tab active">SECTION 1 OF 1</button>
      </div>
      
      <div class="viewer-container">
        <app-question-viewer></app-question-viewer>
      </div>
    </div>

    <!-- Right Sidebar Palette -->
    <div class="sidebar flex-col">
      <app-question-palette (submitRequested)="openSubmitDialog()"></app-question-palette>
    </div>
  </div>

  <app-submit-dialog 
    *ngIf="showSubmitDialog" 
    (confirm)="onSubmitConfirmed()" 
    (cancel)="onSubmitCancelled()">
  </app-submit-dialog>
</div>
