<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-container">
        <div class="logo-icon">EG</div>
        <h1>Exam<span>Genie</span></h1>
      </div>
      <p>Create your account and start generating exams.</p>
    </div>

    @if (errorMessage) {
      <div class="error-toast">
        <p>{{ errorMessage }}</p>
      </div>
    }

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="displayName">Full Name</label>
        <div class="input-wrapper">
          <lucide-icon [name]="User" size="18" class="input-icon"></lucide-icon>
          <input 
            type="text" 
            id="displayName" 
            formControlName="displayName" 
            placeholder="John Doe"
            [class.invalid]="registerForm.get('displayName')?.invalid && registerForm.get('displayName')?.touched"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <lucide-icon [name]="Mail" size="18" class="input-icon"></lucide-icon>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            placeholder="name@example.com"
            [class.invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <lucide-icon [name]="Lock" size="18" class="input-icon"></lucide-icon>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
            [class.invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <lucide-icon [name]="Lock" size="18" class="input-icon"></lucide-icon>
          <input 
            type="password" 
            id="confirmPassword" 
            formControlName="confirmPassword" 
            placeholder="••••••••"
            [class.invalid]="registerForm.get('confirmPassword')?.touched && (registerForm.get('confirmPassword')?.invalid || registerForm.hasError('mismatch'))"
          >
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="registerForm.invalid || isLoading">
        @if (isLoading) {
          <span class="spinner"></span>
        } @else {
          <lucide-icon [name]="UserPlus" size="18"></lucide-icon>
          <span>Create Account</span>
        }
      </button>
    </form>

    <div class="divider">
      <span>OR</span>
    </div>

    <button type="button" class="btn-google" (click)="loginWithGoogle()" [disabled]="isLoading">
      <lucide-icon [name]="Chrome" size="18"></lucide-icon>
      <span>Continue with Google</span>
    </button>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Sign In</a>
    </p>
  </div>
</div>
